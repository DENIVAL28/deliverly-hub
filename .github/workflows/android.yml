name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "expo-app/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: expo-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: expo-app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Generate signing keystore
        run: |
          keytool -genkey -noprompt -v \
            -keystore android/app/release.keystore \
            -alias releasekey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android123 -keypass android123 \
            -dname "CN=Deliverly Hub,O=SOS Sistemas,C=BR"

      - name: Build APK (release — JS bundle sempre incluido)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=releasekey \
            -Pandroid.injected.signing.key.password=android123 \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deliverly-hub-release
          path: expo-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
